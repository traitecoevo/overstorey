name: Render and publish

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Restores the pinned environment so frozen results are honoured.
      # NOTE: posts pin their own plant version/commit via front matter and
      # _freeze/ — CI does NOT re-execute frozen posts, so it does not need
      # to install every historical ref. It only needs the env to render
      # and to run any *changed* .qmd. If you change a develop post and want
      # it re-run in CI, restore that post's renv.lock.dev in a prior step:
      #   renv::restore(lockfile = "posts/<slug>/renv.lock.dev")
      - uses: r-lib/actions/setup-renv@v2

      # Renders using committed _freeze/ — only changed .qmd re-execute.
      - name: Render
        run: quarto render

      - name: Deploy to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
