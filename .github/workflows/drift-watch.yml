name: Model drift watch (scheduled)

# Weekly early-warning: re-run all reproduction posts against plant's
# current master HEAD and report which figures move. Does NOT publish or
# commit — purely informational, so develop-pinned history is untouched.

on:
  schedule:
    - cron: "0 6 * * 1"        # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }

      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: r-lib/actions/setup-r@v2
        with: { use-public-rspm: true }
      - uses: r-lib/actions/setup-renv@v2

      - name: Install plant @ master HEAD
        run: Rscript -e 'renv::install("traitecoevo/plant@master")'

      - name: Snapshot current figures
        run: |
          mkdir -p /tmp/before
          # collect existing rendered figure assets from committed _freeze
          find _freeze -name '*.png' -exec cp --parents {} /tmp/before/ \; 2>/dev/null || true

      - name: Re-run reproductions against master
        run: |
          Rscript R/select_targets.R --scope category --target reproduction > targets.txt
          while read -r post; do
            [ -z "$post" ] && continue
            rm -rf "_freeze/${post}"
            quarto render "${post}/index.qmd" || true
          done < targets.txt

      - name: Report movers
        run: |
          Rscript R/figure_diff.R /tmp/before _freeze > drift-report.md || true
          cat drift-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift report
        uses: actions/upload-artifact@v6
        with:
          name: drift-report
          path: |
            drift-report.md
            _freeze/
          retention-days: 30
