project:
  type: website
  output-dir: _site
  preview:
    port: 4848
    browser: true
  # Reorder browser-tab titles from "Page – Overstorey" to "Overstorey – Page".
  # Quarto composes <title> in its HTML writer after Lua filters run, so this
  # is only fixable on rendered output. See assets/swap-title.py.
  post-render: assets/swap-title.py

# Only re-execute a .qmd when it (or its deps) change. Essential given
# plant's run times. Commit _freeze/ so CI never re-runs everything.
#
# Do NOT enable knitr `cache: true` here. plant's objects (Parameters, SCM,
# Environment, ...) are Rcpp/R6 wrappers around external C++ pointers, which do
# not survive knitr's per-chunk serialize/lazy-load. A cached upstream object
# reloads with a dangling pointer, so e.g. `run_scm(p)` silently fails ("All
# events completed"). File-level `freeze` already gives us the caching we need.
execute:
  freeze: auto
  warning: false
  message: false

website:
  title: "Overstorey"
  description: "a field guide to the plant model"
  site-url: "https://traitecoevo.github.io/overstorey"
  repo-url: "https://github.com/traitecoevo/overstorey"
  repo-actions: [edit, issue]
  reader-mode: true
  page-navigation: true

  navbar:
    background: primary
    pinned: true
    logo: assets/leaf-mark.svg
    left:
      - text: "Guides"
        file: guides/index.qmd
      - text: "Theory"
        file: theory/index.qmd
      # "Adaptively" is the version-pinned notebook/blog (route stays posts/).
      # Distinct from the Theory section's "Adaptive dynamics" page — the
      # blog is a navbar section, the theory page lives under Theory.
      - text: "Adaptively"
        file: posts/index.qmd
      - text: "Reproductions"
        file: posts/reproductions.qmd
      - text: "Reference"
        href: "https://traitecoevo.github.io/plant/reference/"
        target: _blank
    right:
      - text: "Pipeline"
        file: develop.qmd
      - icon: github
        href: "https://github.com/traitecoevo/plant"
        target: _blank
        aria-label: plant source on GitHub

  sidebar:
    - title: "Guides"
      style: floating
      contents:
        - guides/index.qmd
        - section: "Getting started"
          contents:
            - guides/install.qmd
            - guides/first-individual.qmd
        - section: "Running the model"
          contents:
            - guides/patch-dynamics.qmd
            - guides/strategies.qmd
            - guides/extrinsic-drivers.qmd
            - guides/calibration.qmd
        - section: "Worked examples"
          contents:
            - guides/example-analysis.qmd
            - guides/self-thinning.qmd
            - guides/emergent-properties.qmd
    - title: "Theory"
      style: floating
      contents:
        - theory/index.qmd
        - section: "Core"
          contents:
            - theory/size-structured-pde.qmd
            - theory/assimilation-hydraulics.qmd
            - theory/adaptive-dynamics.qmd
        - section: "Models"
          contents:
            - theory/models/index.qmd
            - theory/models/ff16.qmd
            - theory/models/k93.qmd
            - theory/models/tf24.qmd
        - section: "Implementation"
          contents:
            - theory/implementation/index.qmd
            - theory/implementation/characteristic-method.qmd
            - theory/implementation/ode-stepping.qmd
            - theory/implementation/node-spacing.qmd
            - theory/implementation/canopy-models.qmd
    - title: "Pipeline"
      style: floating
      contents:
        - develop.qmd
        - section: "Contributing"
          contents:
            - contributing/package-organisation.qmd
            - contributing/implementing-a-strategy.qmd
            - contributing/profiling.qmd

  page-footer:
    left: "Built with Quarto · frozen for reproducibility"
    right:
      - text: "License"
        href: "https://github.com/traitecoevo/plant/blob/master/LICENSE"

bibliography: assets/refs.bib
csl: assets/mee.csl

format:
  html:
    theme:
      - cosmo
      - assets/plant.scss
    css: assets/extras.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style: assets/canopy.theme
    fig-responsive: true
    fig-align: center
    grid:
      sidebar-width: 270px
      body-width: 820px
      margin-width: 250px
    include-in-header:
      - assets/fonts.html
